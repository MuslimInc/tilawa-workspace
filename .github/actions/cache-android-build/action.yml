name: Cache Android build tooling
description: >
  Restore Gradle, NDK/CMake, melos, and build_runner caches so repeat
  release / App Distribution builds skip redundant work.

runs:
  using: composite
  steps:
    - name: Cache Gradle (project + wrapper)
      uses: actions/cache@v5
      with:
        path: |
          apps/tilawa/android/.gradle
        key: gradle-project-${{ runner.os }}-${{ hashFiles('apps/tilawa/android/**/*.gradle*', 'apps/tilawa/android/**/gradle-wrapper.properties', 'pubspec.lock') }}
        restore-keys: |
          gradle-project-${{ runner.os }}-

    - name: Cache Android NDK and CMake
      uses: actions/cache@v5
      with:
        path: |
          ~/.android/sdk/ndk
          ~/.android/sdk/cmake
        key: android-ndk-cmake-${{ runner.os }}-${{ hashFiles('apps/tilawa/android/**/build.gradle', 'apps/tilawa/android/settings.gradle') }}
        restore-keys: |
          android-ndk-cmake-${{ runner.os }}-

    - name: Cache melos global package
      uses: actions/cache@v5
      with:
        path: |
          ~/.pub-cache/global_packages/melos
          ~/.pub-cache/bin/melos
        key: melos-global-${{ runner.os }}-7.8.2
        restore-keys: |
          melos-global-${{ runner.os }}-

    - name: Cache build_runner incremental state
      uses: actions/cache@v5
      with:
        path: |
          apps/tilawa/.dart_tool/build
          packages/core/.dart_tool/build
        key: build-runner-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'apps/tilawa/pubspec.lock', 'packages/core/pubspec.lock', 'apps/tilawa/build.yaml', 'packages/core/build.yaml') }}
