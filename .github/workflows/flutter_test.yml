name: Flutter Test & Deploy

env:
  FLUTTER_VERSION: "3.41.7"
  PACKAGE_NAME: "com.tilawa.app"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter-plugins-dependencies
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Melos
        run: dart pub global activate melos

      - name: Add Melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Generate Code
        run: melos run gen --no-select

      - name: Run Tests
        run: melos exec --no-select -- "flutter test --reporter expanded"

  build_android:
    name: Build & Deploy Android
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.flutter-plugins-dependencies
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Melos
        run: dart pub global activate melos

      - name: Add Melos to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap Workspace
        run: melos bootstrap

      - name: Generate Code
        run: melos run gen --no-select

      - name: Configure Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEY_PROPERTIES" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/tilawa/android/app/upload-keystore.jks
            echo "$ANDROID_KEY_PROPERTIES" > apps/tilawa/android/key.properties
          fi

      - name: Build with Shorebird (Split APKs)
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        working-directory: apps/tilawa
        run: |
          shorebird release android \
            --artifact apk \
            --target-platform android-arm,android-arm64,android-x64 \
            --flutter-version=${{ env.FLUTTER_VERSION }} \
            --no-confirm

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: apps/tilawa/build/app/outputs/flutter-apk/*.apk

      - name: Deploy to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute
            apps/tilawa/build/app/outputs/flutter-apk/app-release.apk --app ${{
            secrets.FIREBASE_ANDROID_APP_ID ||
            '1:181575856185:android:d43fb05037208139381de8' }} --groups testers
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

