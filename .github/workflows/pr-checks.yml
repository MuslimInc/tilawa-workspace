name: PR Checks

# Fast feedback gate for pull requests: regenerate code, run static analysis,
# and run the test suite. Catches compile/analyze errors (e.g. an interface
# change that breaks an implementer) long before they surface in the much
# slower signed-release build.
#
# NOTE: If jobs fail in ~3s with no steps and annotation "recent account
# payments have failed or spending limit needs to be increased", fix GitHub
# billing (Settings → Billing & plans) — not a workflow defect.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      # Keep in sync with .github/workflows/android-release.yml.
      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Generate code (melos run gen)
        run: dart run melos run gen

      - name: Analyze (dart analyze --fatal-infos)
        run: |
          # flex_color_scheme is a vendored third-party fork — don't gate our
          # PRs on its lint infos. Every first-party package still runs under
          # the strict --fatal-infos so real errors fail the check.
          dart run melos exec --ignore="flex_color_scheme" -- dart analyze --fatal-infos

      - name: Repository lint (analyze + UI Kit policy + format)
        run: dart run melos run lint

      # Advisory for now: master has pre-existing test failures (golden /
      # rendering tests in quran_qcf & tilawa_ui_kit that need real baseline
      # images, plus a few in tilawa). continue-on-error keeps the suite
      # running and visible without blocking PRs until those are triaged and
      # the suite is green; flip this to a hard gate afterwards.
      - name: Test (melos run test) [advisory]
        continue-on-error: true
        run: dart run melos run test

  design-md-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Lint DESIGN.md (@google/design.md)
        run: npx --yes @google/design.md lint DESIGN.md

  quran-sessions-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Firestore emulator + rules tests inside preflight require JDK 21+.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Generate code (melos run gen)
        run: dart run melos run gen

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Quran Sessions preflight (hard gate)
        run: ./scripts/quran_sessions_preflight.sh

  functions-emulator-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Firestore emulator requires JDK 21+ (firebase-tools dropped Java < 21).
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Integration tests (Firestore emulator)
        run: npm run test:integration

      - name: Firestore rules tests (emulator)
        run: npm run test:rules
