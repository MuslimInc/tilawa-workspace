name: Android Release (Google Play)

# Build a signed Android App Bundle with Flutter and publish it to Google
# Play. Trigger it from the GitHub mobile app / web ("Actions" tab -> this
# workflow -> "Run workflow"), so a release can be cut without a laptop.
#
# IMPORTANT: GitHub only shows the "Run workflow" button once this file is on
# the repository's DEFAULT branch. Merge it first, then trigger from mobile.
#
# PROMOTION POLICY — feature flags are compiled into the AAB via dart-defines
# (TILAWA_DISTRIBUTION=play_<track> plus any testing-only flags below). An
# internal/alpha/beta artifact therefore carries closed-testing behaviour with
# it. NEVER promote a testing-track AAB to production in the Play Console;
# always re-run this workflow with track=production so production defaults
# (play_production, all testing flags off) are compiled in.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   - upload keystore (.jks) as base64
#                               (`base64 -w0 upload-keystore.jks`)
#   ANDROID_KEY_PROPERTIES    - the full key.properties file contents
#                               (storePassword / keyPassword / keyAlias lines;
#                               storeFile is overridden by this workflow)
#   PLAY_SERVICE_ACCOUNT_JSON - Google Play service-account JSON (full text)
#
# See docs/ci_release.md for the full setup walkthrough.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track to publish to"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal
        required: true
      build_name:
        description: "Version name, e.g. 1.0.8"
        required: true
      build_number:
        description: "Version code, e.g. 40 (must be higher than the last upload)"
        required: true
      rollout:
        description: "Production staged-rollout fraction (0.0-1.0). 1.0 = full."
        default: "1.0"
        required: false
      learn_quran_student:
        description: >-
          Enable the Learn Quran student hub (closed testing only). Rejected
          when track=production — the resulting AAB must never be promoted to
          production.
        type: boolean
        default: false
        required: false

permissions:
  contents: read

# Never run two publishes at once.
concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Guard — Learn Quran student flag is testing-tracks only
        if: ${{ inputs.learn_quran_student && inputs.track == 'production' }}
        run: |
          echo "::error::learn_quran_student=true is not allowed with track=production." \
            "The Learn Quran student hub is gated to closed testing;" \
            "re-run with track=internal/alpha/beta or disable the flag."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space for release build
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          df -h /


      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter 3.44.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Restore Android build caches
        uses: ./.github/actions/cache-android-build

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Exclude RTC native SDKs (all Play tracks)
        working-directory: apps/tilawa
        run: dart run tool/configure_rtc_deps.dart --stub

      - name: Refresh dependencies after RTC configure
        run: flutter pub get

      - name: Generate code (melos run gen)
        run: |
          # The `gen` melos script calls `melos exec ...` internally, so melos
          # must be on PATH as a global executable (not just `dart run melos`).
          dart pub global activate melos 8.0.0
          export PATH="$HOME/.pub-cache/bin:$PATH"
          melos run gen

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode \
            > "$GITHUB_WORKSPACE/apps/tilawa/android/app/upload-keystore.jks"

      - name: Write key.properties
        env:
          KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/apps/tilawa/android/app/upload-keystore.jks"
          # Keep store/key passwords + alias from the secret, but force storeFile
          # to the keystore we just decoded so the path is always correct in CI.
          printf '%s\n' "$KEY_PROPERTIES" \
            | grep -v -i '^[[:space:]]*storeFile[[:space:]]*=' \
            > "$GITHUB_WORKSPACE/apps/tilawa/android/key.properties"
          echo "storeFile=$KEYSTORE_PATH" \
            >> "$GITHUB_WORKSPACE/apps/tilawa/android/key.properties"

      - name: Stamp changelog publish timestamps
        working-directory: apps/tilawa
        run: |
          python3 tool/stamp_changelog_release.py \
            --release-id "${{ inputs.build_name }}+${{ inputs.build_number }}"

      # Shared runners exhaust disk when global Gradle + Flutter caches stack.
      - name: Reset Gradle caches before bundleRelease
        run: |
          if [ -x apps/tilawa/android/gradlew ]; then
            (cd apps/tilawa/android && ./gradlew --stop) || true
          fi
          rm -rf "$HOME/.gradle/caches"
          df -h /

      - name: Build signed release AAB
        working-directory: apps/tilawa
        run: |
          # arm64-only: ndk.abiFilters (build.gradle) filters plugin JNI; Flutter
          # still AOT-compiles all ABIs unless --target-platform is set (they
          # do not conflict — unlike --split-per-abi).
          flutter build appbundle --release \
            --flavor production \
            --dart-define-from-file=env/production.json \
            --target-platform android-arm64 \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-name=${{ inputs.build_name }} \
            --build-number=${{ inputs.build_number }} \
            --dart-define=TILAWA_DISTRIBUTION=play_${{ inputs.track }} \
            --dart-define=TILAWA_LAUNCH_LEARN_QURAN_STUDENT_FEATURE_ENABLED=${{ inputs.learn_quran_student && inputs.track != 'production' }}

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-symbols-${{ inputs.build_number }}
          path: apps/tilawa/build/symbols
          if-no-files-found: ignore

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.tilawa.app
          releaseFiles: apps/tilawa/build/app/outputs/bundle/productionRelease/app-production-release.aab
          tracks: ${{ inputs.track }}
          # Staged rollout only applies to production with a fraction < 1.0.
          status: ${{ (inputs.track == 'production' && inputs.rollout != '1.0') && 'inProgress' || 'completed' }}
          userFraction: ${{ (inputs.track == 'production' && inputs.rollout != '1.0') && inputs.rollout || '' }}

      - name: Warn — do not promote testing artifacts to production
        if: ${{ inputs.track != 'production' }}
        run: |
          {
            echo "## ⚠️ Do NOT promote this AAB to production"
            echo ""
            echo "This artifact was compiled for **play_${{ inputs.track }}**:"
            echo "- Learn Quran student hub: **${{ inputs.learn_quran_student && 'ENABLED' || 'disabled' }}**"
            echo "- Closed-testing flag defaults (booking, teacher application, dashboard summary read) are compiled **ON** for non-production distributions."
            echo ""
            echo "Production releases must be rebuilt with \`track=production\` so play_production defaults apply."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::play_${{ inputs.track }} artifact — never promote to production in Play Console; rebuild with track=production instead."

      - name: Upload AAB as build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: apps/tilawa/build/app/outputs/bundle/productionRelease/app-production-release.aab
          if-no-files-found: ignore
