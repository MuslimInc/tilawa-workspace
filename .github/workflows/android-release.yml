name: Android Release (Google Play)

# Build a signed Android App Bundle with Shorebird and publish it to Google
# Play. Designed to be triggered from the GitHub mobile app / web UI
# ("Actions" tab -> this workflow -> "Run workflow"), so a release can be cut
# without a laptop.
#
# IMPORTANT: GitHub only shows the "Run workflow" button once this file is on
# the repository's DEFAULT branch. Merge it first, then trigger from mobile.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64     - upload keystore (.jks) as base64 (one-time;
#                                 needs the keystore file: `base64 -w0 key.jks`)
#   ANDROID_KEYSTORE_PASSWORD   - keystore store password
#   ANDROID_KEY_PASSWORD        - key password
#   ANDROID_KEY_ALIAS           - key alias
#   SHOREBIRD_TOKEN             - CI token from `shorebird login:ci`
#   PLAY_SERVICE_ACCOUNT_JSON   - Google Play service-account JSON (full text)
#
# See docs/ci_release.md for the full setup walkthrough.

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Google Play track to publish to"
        type: choice
        options: [internal, alpha, beta, production]
        default: internal
        required: true
      build_name:
        description: "Version name, e.g. 1.0.8 (must be committed-compatible)"
        required: true
      build_number:
        description: "Version code, e.g. 40 (must be higher than the last upload)"
        required: true
      rollout:
        description: "Production staged-rollout fraction (0.0-1.0). 1.0 = full."
        default: "1.0"
        required: false

permissions:
  contents: read

# Never run two publishes at once.
concurrency:
  group: android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode \
            > "$GITHUB_WORKSPACE/apps/tilawa/android/app/upload-keystore.jks"

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > "$GITHUB_WORKSPACE/apps/tilawa/android/key.properties" <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/apps/tilawa/android/app/upload-keystore.jks
          EOF

      - name: Build signed AAB with Shorebird
        working-directory: apps/tilawa
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        # GitHub Actions sets CI=true, so Shorebird runs non-interactively.
        # Flutter build args after `--` set the version name/code, so no
        # pubspec edit is needed to bump the release.
        run: |
          shorebird release android \
            --flutter-version=3.44.1 \
            -- \
            --build-name=${{ inputs.build_name }} \
            --build-number=${{ inputs.build_number }}

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.tilawa.app
          releaseFiles: apps/tilawa/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          # Staged rollout only applies to production with a fraction < 1.0.
          status: ${{ (inputs.track == 'production' && inputs.rollout != '1.0') && 'inProgress' || 'completed' }}
          userFraction: ${{ (inputs.track == 'production' && inputs.rollout != '1.0') && inputs.rollout || '' }}

      - name: Upload AAB as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: apps/tilawa/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
