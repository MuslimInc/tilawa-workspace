name: Firebase Admin Hosting

# Build the Angular admin panel and deploy it to Firebase Hosting (site:
# tilawa-admin). Trigger manually from Actions -> "Run workflow".
#
# Required repository secret (same as firebase-app-distribution.yml):
#   FIREBASE_SERVICE_ACCOUNT_JSON - service account JSON with Firebase Hosting
#   Admin (or Firebase Admin) role.
#
# One-time Firebase setup:
#   1. Firebase Console -> Hosting -> Add another site -> tilawa-admin
#   2. Repo-root: firebase target:apply hosting admin tilawa-admin --project quran-playera-app
#      (already committed in .firebaserc; re-run if targets drift)
#   3. Optional custom domain + DNS in Firebase Console

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-admin-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/tilawa_admin/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build admin panel
        working-directory: apps/tilawa_admin
        run: npm ci && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Deploy admin hosting
        run: firebase deploy --only hosting:admin --project quran-playera-app
