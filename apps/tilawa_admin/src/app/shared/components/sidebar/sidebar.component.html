<aside class="w-64 h-full bg-[#071624] dark:bg-gray-900 border-r border-[#1a2d3d] dark:border-gray-800 text-white flex flex-col transition-all duration-300 shadow-[4px_0_24px_rgba(0,0,0,0.05)]">

  <div class="h-16 flex items-center justify-center border-b border-[#1a2d3d] dark:border-gray-800 bg-[#071624] px-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center shadow-lg shadow-blue-500/30">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <span class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-300">Tilawa Admin</span>
    </div>
  </div>

  <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
    <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Main Menu</p>

    <a routerLink="/dashboard" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" [routerLinkActiveOptions]="{exact: true}" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      Dashboard
    </a>

    <a routerLink="/reciters" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      Reciters
    </a>

    <a routerLink="/surahs" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      Surahs
    </a>

    <a routerLink="/users" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      App Users
    </a>

    <div class="pt-4">
      <button type="button" (click)="toggleQuranSessions()" class="w-full flex items-center justify-between px-3 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">
        <span>Quran Sessions</span>
        <span>{{ quranSessionsExpanded() ? '−' : '+' }}</span>
      </button>

      @if (quranSessionsExpanded()) {
        <div class="mt-1 space-y-1">
          <a routerLink="/quran-sessions/teacher-applications" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
            Teacher Applications
          </a>
          <a routerLink="/quran-sessions/teachers" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
            Teachers
          </a>
          <a routerLink="/quran-sessions/users" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
            Users
          </a>
          <a routerLink="/quran-sessions/sessions" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
            Sessions
          </a>
          <a routerLink="/quran-sessions/reports" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
            Reports
          </a>
        </div>
      }
    </div>
  </nav>

  <div class="p-4 border-t border-[#1a2d3d] dark:border-gray-800 bg-[#071624]">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-blue-700 flex items-center justify-center text-sm font-semibold">
        {{ (session()?.email ?? 'A').charAt(0).toUpperCase() }}
      </div>
      <div class="flex flex-col flex-1 min-w-0">
        <span class="text-sm font-medium text-gray-200 truncate">{{ session()?.email ?? 'Admin' }}</span>
        <button type="button" (click)="signOut()" class="text-xs text-gray-500 hover:text-gray-300 text-left">Sign out</button>
      </div>
    </div>
  </div>
</aside>
