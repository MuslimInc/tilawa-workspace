<aside class="w-64 h-full bg-[#0y1a2a] dark:bg-gray-900 border-r border-[#1a2d3d] dark:border-gray-800 text-white flex flex-col transition-all duration-300 shadow-[4px_0_24px_rgba(0,0,0,0.05)]">
  
  <!-- Logo Section -->
  <div class="h-16 flex items-center justify-center border-b border-[#1a2d3d] dark:border-gray-800 bg-[#071624] px-4">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-indigo-400 flex items-center justify-center shadow-lg shadow-blue-500/30">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <span class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-300">Tilawa Admin</span>
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
    
    <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Main Menu</p>

    <!-- Dashboard -->
    <a routerLink="/dashboard" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" [routerLinkActiveOptions]="{exact: true}" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
      Dashboard
    </a>

    <!-- Reciters -->
    <a routerLink="/reciters" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
      </svg>
      Reciters
    </a>

    <!-- Surahs -->
    <a routerLink="/surahs" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
      </svg>
      Surahs
    </a>

    <!-- Users -->
    <a routerLink="/users" routerLinkActive="bg-[#102436] text-white border-l-4 border-blue-500 shadow-md" class="group flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-[#102436] transition-all duration-200 border-l-4 border-transparent">
      <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
      </svg>
      Users
    </a>

  </nav>

  <!-- Sidebar Footer / User Profile -->
  <div class="p-4 border-t border-[#1a2d3d] dark:border-gray-800 bg-[#071624]">
    <div class="flex items-center gap-3">
      <img src="https://ui-avatars.com/api/?name=MK&background=0D8ABC&color=fff&rounded=true" alt="Admin" class="w-10 h-10 rounded-full border-2 border-gray-700 shadow-sm">
      <div class="flex flex-col">
        <span class="text-sm font-medium text-gray-200">System Admin</span>
        <span class="text-xs text-gray-500">View Profile</span>
      </div>
    </div>
  </div>

</aside>
