<div class="min-h-screen flex items-center justify-center bg-[var(--tilawa-canvas)] px-4">
  <div class="absolute top-4 end-4">
    <app-language-switcher />
  </div>

  <div class="w-full max-w-md space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-[var(--tilawa-on-surface)]">{{ 'app_title' | t }}</h1>
      <p class="mt-2 text-sm text-[var(--tilawa-on-surface-variant)]">
        {{ 'login_subtitle' | t }}
      </p>
    </div>

    @if (errorMessage()) {
      <div
        class="rounded-[var(--tilawa-radius-md)] bg-[var(--tilawa-error-container)] p-4 text-sm text-[var(--tilawa-on-error-container)]"
        role="alert"
      >
        {{ errorMessage() }}
      </div>
    }

    <app-tilawa-card>
      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <div>
          <label for="email" class="block text-sm font-medium text-[var(--tilawa-on-surface)]">
            {{ 'login_email' | t }}
          </label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            [(ngModel)]="email"
            class="tilawa-field mt-1"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-[var(--tilawa-on-surface)]">
            {{ 'login_password' | t }}
          </label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            [(ngModel)]="password"
            class="tilawa-field mt-1"
          />
        </div>

        <app-tilawa-button
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="submitting()"
        >
          {{ submitting() ? ('login_signingIn' | t) : ('login_signIn' | t) }}
        </app-tilawa-button>
      </form>
    </app-tilawa-card>
  </div>
</div>
