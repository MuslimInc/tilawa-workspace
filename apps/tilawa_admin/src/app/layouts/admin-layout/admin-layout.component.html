<div class="flex h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans antialiased overflow-hidden">
  
  <!-- Sidebar Navigation -->
  <app-sidebar class="flex-shrink-0 z-20"></app-sidebar>

  <!-- Main Content Wrapper -->
  <div class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    
    <!-- Top Header Bar -->
    <header class="h-16 flex items-center justify-between px-6 bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 z-10">
      
      <!-- Mobile Menu Button (visible only on small screens) -->
      <button class="md:hidden p-2 -ml-2 mr-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <!-- Search Bar -->
      <div class="flex-1 flex items-center">
        <div class="relative w-full max-w-md hidden sm:block">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </div>
          <input class="block w-full pl-10 pr-3 py-2 border border-transparent rounded-lg leading-5 bg-gray-100 dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:bg-white dark:focus:bg-gray-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 sm:text-sm transition-all duration-200" placeholder="Search..." type="search">
        </div>
      </div>

      <!-- Right Nav Area (Theme Toggle, Notifications, Profile) -->
      <div class="ml-4 flex items-center gap-4">
        
        <!-- Notifications -->
        <button class="p-1 text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 focus:outline-none">
          <span class="sr-only">View notifications</span>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>

        <!-- Profile Dropdown -->
        <div class="relative">
          <button class="flex items-center gap-2 focus:outline-none">
            <img class="h-8 w-8 rounded-full object-cover ring-2 ring-transparent hover:ring-blue-500 transition-all duration-200" src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="User avatar">
            <span class="hidden md:block text-sm font-medium text-gray-700 dark:text-gray-200">Admin</span>
            <svg class="hidden md:block h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 relative overflow-y-auto focus:outline-none p-6 md:p-8">
      <div class="max-w-7xl mx-auto animate-fade-in-up">
        <router-outlet></router-outlet>
      </div>
    </main>
    
  </div>
</div>
