<div class="tilawa-admin-shell">
  <app-sidebar />

  <div class="tilawa-admin-main">
    <header class="tilawa-admin-header">
      <div class="tilawa-admin-header-start">
        <label class="tilawa-admin-search">
          <span class="sr-only">{{ 'layout_search' | t }}</span>
          <svg class="tilawa-admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input
            class="tilawa-field tilawa-admin-search-input"
            type="search"
            [placeholder]="'layout_search' | t"
          />
        </label>
      </div>

      <div class="tilawa-admin-header-end">
        <app-language-switcher />
      </div>
    </header>

    <main class="tilawa-admin-content">
      <div class="tilawa-admin-content-inner">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
