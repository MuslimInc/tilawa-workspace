plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
    id "com.google.firebase.firebase-perf"
    id "jacoco"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.tilawa.app"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.tilawa.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 24
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        // Play AAB: arm64 only — 64-bit required on Play since 2019.
        // ndk.abiFilters limits native code built by this module only; plugin
        // AARs (Agora, etc.) still merge prebuilt .so for every ABI unless
        // packaging.jniLibs.excludes strips them below. Flutter AOT needs
        // --target-platform android-arm64 for libapp.so. Do not combine
        // abiFilters with --split-per-abi.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    flavorDimensions "environment"
    productFlavors {
        development {
            dimension "environment"
            applicationIdSuffix ".dev"
            resValue "string", "app_name", "MeMuslim Dev"
            manifestPlaceholders = [appName: "MeMuslim Dev"]
        }
        staging {
            dimension "environment"
            applicationIdSuffix ".staging"
            resValue "string", "app_name", "MeMuslim Staging"
            manifestPlaceholders = [appName: "MeMuslim Staging"]
        }
        production {
            dimension "environment"
            resValue "string", "app_name", "MeMuslim"
            manifestPlaceholders = [appName: "MeMuslim"]
        }
    }

    signingConfigs {
        if (keystoreProperties['storeFile'] != null) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    packaging {
        jniLibs {
            // Plugin AARs ship arm64 + armeabi-v7a + x86_64; keep arm64 only.
            excludes += ['**/armeabi-v7a/**', '**/x86/**', '**/x86_64/**']
        }
    }

    buildTypes {
        release {
            if (signingConfigs.findByName('release') != null) {
                signingConfig signingConfigs.release
            }
            // key.properties absent → no release signingConfig. Debug builds
            // proceed with the default debug keystore. CI supplies credentials
            // via env; running assembleRelease without them will fail at the
            // apksigner step, which is the correct fail-fast for release.

            // R8 full-mode: shrinks/obfuscates Java/Kotlin bytecode and strips
            // unused resources. Keep rules for Flutter, Firebase, audio,
            // and the native prayer receivers live in
            // proguard-rules.pro; plugin AARs supply their own consumer rules.
            // Does not affect libapp.so (Dart AOT) — that is governed by the
            // Flutter build flags — but trims the absolute install size.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
        }
    }

    testOptions {
        unitTests.includeAndroidResources = true
        unitTests.returnDefaultValues = true
        unitTests.all {
            jacoco {
                includeNoLocationClasses = true
                excludes = ['jdk.internal.*']
            }
        }
    }
}

flutter {
    source "../.."
}

// androidx.credentials 1.6.0 (pulled by google_sign_in_android) routes Google
// sign-in through the new GMS identitycredentials module, whose
// SignInCredentialChooserActivity renders invisibly on Transsion/XOS (Infinix
// X1101B: chooser is top-resumed but SurfaceFlinger keeps it
// hidden-by-policy, so sign-in hangs until timeout). 1.5.0 (ChatGPT's line)
// avoids identityauth and uses the legacy playservices path these ROMs composite.
// Plugin only uses androidx.credentials APIs that exist since 1.2.0.
configurations.configureEach {
    // Screen sharing is not shipped yet; Agora's full-screen-sharing AAR adds
    // FOREGROUND_SERVICE_MEDIA_PROJECTION and Play Console FGS declaration friction.
    exclude group: 'io.agora.rtc', module: 'full-screen-sharing'
    resolutionStrategy {
        force "androidx.credentials:credentials:1.5.0"
        force "androidx.credentials:credentials-play-services-auth:1.5.0"
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.core:core-splashscreen:1.0.1"
    implementation "androidx.work:work-runtime-ktx:2.9.0"
    implementation 'com.google.firebase:firebase-analytics-ktx:21.6.2'
    implementation 'com.google.firebase:firebase-crashlytics-ktx:18.6.4'
    
    // Jetpack Media3 ExoPlayer
    implementation "androidx.media3:media3-exoplayer:1.2.1"
    implementation "androidx.media3:media3-common:1.2.1"
    
    // Testing Dependencies
    testImplementation "junit:junit:4.13.2"
    testImplementation "org.jetbrains.kotlin:kotlin-test"
    testImplementation "io.mockk:mockk:1.13.10"
    testImplementation "org.robolectric:robolectric:4.12.1"
    testImplementation "androidx.test:core:1.5.0"
    testImplementation "androidx.test.ext:junit:1.1.5"
    testImplementation "androidx.work:work-testing:2.9.0"
    
    // Core dependencies needed for tests
    testImplementation "androidx.work:work-runtime-ktx:2.9.0"
}

jacoco {
    toolVersion = "0.8.12"
}

tasks.register("jacocoTestReport", JacocoReport) {
    dependsOn "testDebugUnitTest"

    reports {
        xml.required = true
        html.required = true
    }

    def fileFilter = [
        '**/R.class',
        '**/R$*.class',
        '**/BuildConfig.*',
        '**/Manifest*.*',
        '**/*Test*.*',
        'android/**/*.*',
        '**/*$Lambda$*.*',
        '**/*$Companion*.*',
        '**/*$MethodHandlers*.*',
        '**/*_MembersInjector.class',
        '**/*_Factory.class',
        '**/*_ProvideValueFactory.class',
        '**/*ExtensionsKt.class'
    ]

    def kotlinTree = fileTree(
            dir: "${project.buildDir}/intermediates/classes/debug/transformDebugClassesWithAsm/dirs",
            excludes: fileFilter
    )
    def mainSrc = "${project.projectDir}/src/main/kotlin"

    sourceDirectories.setFrom(files([mainSrc]))
    classDirectories.setFrom(files([kotlinTree]))
    executionData.setFrom(fileTree(dir: "${project.buildDir}", includes: [
            "jacoco/testDebugUnitTest.exec"
    ]))
}
