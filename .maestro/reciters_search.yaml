# reciters_search.yaml
# Smoke test: activate the search field, type, erase, and verify no crash.
#
# NOTE: Maestro does not support Unicode (Arabic) inputText — see
#   https://github.com/mobile-dev-inc/maestro/issues/146
# The query "al" is used as an ASCII stand-in. Reciter names are Arabic, so
# the search will produce an empty-results state, which is itself a valid
# test path (field accepts input → filters → erase → full list restored).
#
# Semantics identifiers used (see reciter_semantics_ids.dart):
#   reciters_tab           – bottom-nav destination (person icon off-tab;
#                            search icon when already on reciters; re-tap
#                            focuses search — this flow taps the field directly)
#   reciters_search_field  – search text field in reciters header
#
# Prerequisites:
#   • App is installed as com.tilawa.app
#   • Device/emulator has internet access

appId: com.tilawa.app
---

# ── Launch ───────────────────────────────────────────────────────────────────
- launchApp:
    clearState: false
- runFlow:
    file: subflows/ensure_main_shell.yaml

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# ── Navigate to Reciters tab ─────────────────────────────────────────────────
- tapOn:
    id: "reciters_tab"
- waitForAnimationToEnd

# Wait for the list to finish loading
- extendedWaitUntil:
    visible:
      id: "reciters_search_field"
    timeout: 10000
- assertVisible:
    id: "reciters_search_field"

# ── Activate search and type an ASCII query ──────────────────────────────────
- tapOn:
    id: "reciters_search_field"
- inputText: "al"
- waitForAnimationToEnd

# Search field is still on screen (no crash, UI responded to input)
- assertVisible:
    id: "reciters_search_field"

# ── Erase the query (restore full list) ─────────────────────────────────────
- eraseText: 10
- waitForAnimationToEnd

# Full list is restored – search field is still present
- assertVisible:
    id: "reciters_search_field"
