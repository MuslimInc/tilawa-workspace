# reciters_search.yaml
# Opens dedicated search screen and exercises query input.
#
# Run:
#   maestro test .maestro/reciters_search.yaml --udid emulator-5554

appId: com.tilawa.app
---

- launchApp:
    clearState: false
- runFlow:
    file: subflows/ensure_main_shell.yaml

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

- tapOn:
    id: "reciters_tab"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "reciters_search_launcher"
    timeout: 10000

- tapOn:
    id: "reciters_search_launcher"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "reciters_search_field"
    timeout: 5000

- tapOn:
    id: "reciters_search_field"
- inputText: "al"
- waitForAnimationToEnd

- assertVisible:
    id: "reciters_search_field"

- eraseText: 10
- waitForAnimationToEnd

- tapOn:
    point: "5%, 8%"
- waitForAnimationToEnd
- assertVisible:
    id: "reciters_search_launcher"
