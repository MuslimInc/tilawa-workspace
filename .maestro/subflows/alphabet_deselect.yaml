appId: com.tilawa.app
---
# Tap the same rail row twice without moving → deselect (no filter chip).
# Prior scrub steps end near the bottom of the index; use the top track
# point (8%) so the first tap selects a stable letter, then the second
# tap clears it.

- tapOn:
    id: "reciters_alphabet_scrollbar"
    point: "50%, 8%"
- waitForAnimationToEnd
- assertVisible:
    id: "reciters_alphabet_letter_selected"

- tapOn:
    id: "reciters_alphabet_scrollbar"
    point: "50%, 8%"
- waitForAnimationToEnd
- assertNotVisible:
    id: "reciters_alphabet_letter_selected"

# Hide rail — no letter filter chip when nothing is selected.
- tapOn:
    id: "reciters_letter_index_toggle"
- waitForAnimationToEnd
- assertNotVisible:
    id: "reciters_alphabet_scrollbar"
- assertNotVisible:
    id: "reciters_letter_filter_chip"

- tapOn:
    id: "reciters_letter_index_toggle"
- waitForAnimationToEnd
- assertVisible:
    id: "reciters_alphabet_scrollbar"
