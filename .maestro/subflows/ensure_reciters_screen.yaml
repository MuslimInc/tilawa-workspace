appId: com.tilawa.app
---
# Navigate to Reciters tab and dismiss permission dialogs if shown.
- tapOn:
    id: "reciters_tab"
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

- runFlow:
    when:
      visible: "السماح"
    commands:
      - tapOn: "السماح"
