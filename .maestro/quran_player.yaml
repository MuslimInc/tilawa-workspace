# quran_player.yaml
# Full end-to-end smoke test for [QuranPlayerWidget] / Quran audio player.
#
# Modular flows (run individually for faster feedback):
#   .maestro/quran_player/quran_player_mini.yaml
#   .maestro/quran_player/quran_player_mini_open.yaml
#   .maestro/quran_player/quran_player_mini_dismiss.yaml
#   .maestro/quran_player/quran_player_queue_sheet.yaml
#   .maestro/quran_player/quran_player_gestures.yaml
#   .maestro/quran_player/quran_player_stop.yaml
#   .maestro/quran_player/quran_player_pop_scenarios.yaml
#   .maestro/quran_player/quran_player_rtl.yaml
#
# What this flow proves
# ─────────────────────
#   1. Mini-player appears when audio starts from reciter details.
#   2. Mini-player play/pause, close, and expand (tap).
#   3. Expanded player chrome: collapse, overflow, artwork, title, artist,
#      seek bar, position/duration, transport row, action pills.
#   4. Transport controls (shuffle, prev, play/pause, next, repeat).
#   5. Volume + speed slider dialogs (player stays mounted after dismiss).
#   6. Overflow sheet: sleep timer, background source, stop playback.
#   7. Sleep timer dialog presets and action-pill entry.
#   8. Background source dialog (gallery / camera / close).
#   9. Queue sheet handle and track tiles switch playback.
#  10. Collapse returns mini-player; close dismisses the bar.
#
# Semantics identifiers:
#   apps/tilawa/lib/features/audio_player/presentation/quran_player_semantics_ids.dart
#
# Prerequisites
# ─────────────
#   • App installed as com.tilawa.app
#   • Internet access (audio from mp3quran.net)
#   • reciter_card_10 visible on Reciters tab
#   • Sleep-timer enabled in Settings (optional; guarded with runFlow.when)
#
# How to run
# ──────────
#   maestro test .maestro/quran_player.yaml
#
# Arabic (RTL):
#   adb shell settings put system system_locales ar-SA
#   maestro test .maestro/quran_player/quran_player_rtl.yaml

appId: com.tilawa.app
---

- launchApp:
    clearState: false
- runFlow:
    file: subflows/ensure_main_shell.yaml
- runFlow:
    file: quran_player/subflows/dismiss_permissions.yaml
- runFlow:
    file: quran_player/subflows/start_playback.yaml

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 2 — Mini-player
# ══════════════════════════════════════════════════════════════════════════════

- assertVisible:
    id: "quran_player_mini"
- assertVisible:
    id: "quran_player_mini_play_pause"
- assertVisible:
    id: "quran_player_mini_close"

- tapOn:
    id: "quran_player_mini_play_pause"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_mini_play_pause"
- waitForAnimationToEnd

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 3 — Expand
# ══════════════════════════════════════════════════════════════════════════════

- runFlow:
    file: quran_player/subflows/expand_player.yaml

- assertVisible:
    id: "quran_player_track_title"
- assertVisible:
    id: "quran_player_track_artist"
- assertVisible:
    id: "quran_player_artwork"
- assertVisible:
    id: "quran_player_collapse"
- assertVisible:
    id: "quran_player_more_menu"
- assertVisible:
    id: "quran_player_play_pause"
- assertVisible:
    id: "quran_player_next"
- assertVisible:
    id: "quran_player_previous"
- assertVisible:
    id: "quran_player_shuffle"
- assertVisible:
    id: "quran_player_repeat"
- assertVisible:
    id: "quran_player_seek"
- assertVisible:
    id: "quran_player_position"
- assertVisible:
    id: "quran_player_duration"
- assertVisible:
    id: "quran_player_pill_speed"
- assertVisible:
    id: "quran_player_pill_volume"
- assertVisible:
    id: "quran_player_queue_sheet"
- assertVisible:
    id: "quran_player_queue_handle"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 4 — Transport controls
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_play_pause"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_play_pause"
- waitForAnimationToEnd

- tapOn:
    id: "quran_player_shuffle"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_shuffle"
- waitForAnimationToEnd

- tapOn:
    id: "quran_player_repeat"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_repeat"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_repeat"
- waitForAnimationToEnd

- tapOn:
    id: "quran_player_next"
- waitForAnimationToEnd
- tapOn:
    id: "quran_player_previous"
- waitForAnimationToEnd

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 5 — Volume slider (regression: player stays mounted behind dialog)
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_pill_volume"
- extendedWaitUntil:
    visible:
      id: "quran_player_slider_dialog"
    timeout: 5000
- assertVisible:
    id: "quran_player_slider_dialog"
- assertVisible:
    id: "quran_player_slider_dialog_slider"
- assertVisible:
    id: "quran_player_slider_dialog_value"

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd

- assertNotVisible:
    id: "quran_player_slider_dialog"
- assertVisible:
    id: "quran_player_track_title"
- assertVisible:
    id: "quran_player_track_artist"
- assertVisible:
    id: "quran_player_pill_volume"
- assertVisible:
    id: "quran_player_collapse"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 6 — Speed slider
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_pill_speed"
- extendedWaitUntil:
    visible:
      id: "quran_player_slider_dialog"
    timeout: 5000
- assertVisible:
    id: "quran_player_slider_dialog"

- tapOn:
    point: "50%,10%"
- waitForAnimationToEnd
- assertNotVisible:
    id: "quran_player_slider_dialog"
- assertVisible:
    id: "quran_player_track_title"
- assertVisible:
    id: "quran_player_pill_speed"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 7 — Overflow sheet (background / sleep timer / stop)
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_more_menu"
- waitForAnimationToEnd

- assertVisible:
    id: "quran_player_menu_background"
- assertVisible:
    id: "quran_player_menu_stop"

- tapOn:
    id: "quran_player_menu_background"
- extendedWaitUntil:
    visible:
      id: "quran_player_background_source_dialog"
    timeout: 5000
- assertVisible:
    id: "quran_player_background_source_gallery"
- assertVisible:
    id: "quran_player_background_source_camera"
- assertVisible:
    id: "quran_player_background_source_close"

- tapOn:
    id: "quran_player_background_source_close"
- waitForAnimationToEnd
- assertNotVisible:
    id: "quran_player_background_source_dialog"

- tapOn:
    id: "quran_player_more_menu"
- waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "quran_player_menu_sleep_timer"
    commands:
      - tapOn:
          id: "quran_player_menu_sleep_timer"
      - extendedWaitUntil:
          visible:
            id: "quran_player_sleep_timer_dialog"
          timeout: 5000
      - assertVisible:
          id: "quran_player_sleep_timer_15"
      - assertVisible:
          id: "quran_player_sleep_timer_30"
      - assertVisible:
          id: "quran_player_sleep_timer_60"
      - assertVisible:
          id: "quran_player_sleep_timer_end_of_track"
      - assertVisible:
          id: "quran_player_sleep_timer_custom"
      - tapOn:
          id: "quran_player_sleep_timer_15"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "quran_player_sleep_timer_cancel"
          commands:
            - tapOn:
                id: "quran_player_sleep_timer_cancel"
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "quran_player_sleep_timer_close"
          commands:
            - tapOn:
                id: "quran_player_sleep_timer_close"
            - waitForAnimationToEnd
      - assertNotVisible:
          id: "quran_player_sleep_timer_dialog"

- runFlow:
    when:
      notVisible:
        id: "quran_player_menu_sleep_timer"
    commands:
      - back
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        id: "quran_player_pill_sleep_timer"
    commands:
      - tapOn:
          id: "quran_player_pill_sleep_timer"
      - extendedWaitUntil:
          visible:
            id: "quran_player_sleep_timer_dialog"
          timeout: 5000
      - tapOn:
          id: "quran_player_sleep_timer_close"
      - waitForAnimationToEnd

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 8 — Queue
# ══════════════════════════════════════════════════════════════════════════════

- runFlow:
    when:
      visible:
        id: "quran_player_queue_item_002"
    commands:
      - scrollUntilVisible:
          element:
            id: "quran_player_queue_item_002"
          direction: DOWN
          timeout: 8000
      - tapOn:
          id: "quran_player_queue_item_002"
      - waitForAnimationToEnd
      - tapOn:
          id: "quran_player_queue_item_001"
      - waitForAnimationToEnd

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 9 — Collapse
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_collapse"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "quran_player_mini"
    timeout: 5000
- assertVisible:
    id: "quran_player_mini"

# ══════════════════════════════════════════════════════════════════════════════
# PHASE 10 — Mini-player dismiss (close button)
# ══════════════════════════════════════════════════════════════════════════════

- tapOn:
    id: "quran_player_mini_close"
- waitForAnimationToEnd
- assertNotVisible:
    id: "quran_player_mini"
