# splash_screen.yaml
# Smoke test for the Tilawa (تلاوة) splash / startup flow.
#
# Prerequisites: App installed as com.tilawa.app

appId: com.tilawa.app
---
- launchApp:
    clearState: false

- waitForAnimationToEnd

# Splash loading live-region (English; Arabic devices use the same test path
# via reciters_tab once the shell is shown).
- extendedWaitUntil:
    visible: "Tilawa, loading"
    timeout: 8000
    optional: true

# Logged-in users land on the main shell.
- extendedWaitUntil:
    visible:
      id: "reciters_tab"
    timeout: 20000
    optional: true

# First-run / logged-out users land on onboarding.
- runFlow:
    when:
      notVisible:
        id: "reciters_tab"
    commands:
      - extendedWaitUntil:
          visible: "Get started"
          timeout: 8000
          optional: true
      - extendedWaitUntil:
          visible: "ابدأ"
          timeout: 8000
