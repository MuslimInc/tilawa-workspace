# Maestro E2E smoke test — Prayer Times Notifications settings in RTL locale.
#
# Prerequisites:
#   - Device / simulator locale is set to Arabic (ar) before running.
#
# Run:
#   maestro test .maestro/prayer_notifications_rtl.yaml

appId: com.tilawa.app

---

# ── 1. Launch (locale must already be Arabic on device) ───────────────────────
- launchApp:
    clearState: false
- runFlow:
    file: subflows/ensure_main_shell.yaml

# ── 2. Handle Android POST_NOTIFICATIONS permission dialog (if shown) ─────────
- runFlow:
    when:
      visible: "السماح"
    commands:
      - tapOn: "السماح"

- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# ── 3. Navigate to Prayer Times tab ──────────────────────────────────────────
- tapOn:
    id: "prayer_times_tab"

- waitForAnimationToEnd

# ── 4. Open Prayer Notifications sheet ───────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "prayer_notifications_entry_point"
    direction: DOWN
    timeout: 10000

- tapOn:
    id: "prayer_notifications_entry_point"

- waitForAnimationToEnd

# ── 5. Assert Prayer Notifications section ────────────────────────────────────
- assertVisible:
    id: "prayer_notifications_section"

# ── 6. Assert global toggle visible in RTL layout ─────────────────────────────
- scrollUntilVisible:
    element:
      id: "prayer_notifications_global_toggle"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "prayer_notifications_global_toggle"

# ── 7. Assert Fajr toggle visible in RTL layout ──────────────────────────────
- scrollUntilVisible:
    element:
      id: "prayer_notification_fajr_toggle"
    direction: DOWN
    timeout: 5000

- assertVisible:
    id: "prayer_notification_fajr_toggle"

# ── 8. Dismiss ────────────────────────────────────────────────────────────────
- swipe:
    direction: DOWN
    duration: 400
