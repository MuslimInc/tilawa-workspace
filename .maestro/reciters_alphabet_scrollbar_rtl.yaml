# reciters_alphabet_scrollbar_rtl.yaml
# RTL variant — rail on leading edge; same scenario coverage as LTR.
#
# Optional: set Arabic locale before running:
#   adb shell settings put system system_locales ar-SA
#
# Run:
#   maestro test .maestro/reciters_alphabet_scrollbar_rtl.yaml --udid emulator-5554

appId: com.tilawa.app
---

- launchApp:
    clearState: false
- runFlow:
    file: subflows/ensure_main_shell.yaml
- runFlow:
    file: subflows/ensure_reciters_screen.yaml
- runFlow:
    file: subflows/ensure_reciters_alphabet.yaml
- runFlow:
    file: subflows/alphabet_reset_filters.yaml
- runFlow:
    file: subflows/alphabet_scroll_rail.yaml
- runFlow:
    file: subflows/alphabet_scrub_gestures.yaml
- runFlow:
    file: subflows/alphabet_deselect.yaml
- runFlow:
    file: subflows/alphabet_filter_chip.yaml
- runFlow:
    file: subflows/alphabet_clear_all.yaml
