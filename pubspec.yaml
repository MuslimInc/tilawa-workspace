name: tilawa_workspace
description: Mono-repo workspace for Tilawa.
publish_to: none
environment:
  sdk: ^3.10.7

workspace:
  - apps/tilawa
  - packages/core
  - packages/qibla
  - packages/ui

dev_dependencies:
  melos: ^7.3.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

dependency_overrides:
  test_api: 0.7.7
