dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # audioplayers: ^0.19.1
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  # excel: 2.0.0-null-safety-3
  file_picker: ^10.3.3
