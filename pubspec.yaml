name: tilawa_workspace
description: Mono-repo workspace for Tilawa.
publish_to: none
environment:
  sdk: ^3.11.3

workspace:
  - apps/tilawa
  - packages/core
  - packages/qibla
  - packages/ui_kit
  - packages/quran

dev_dependencies:
  melos: ^7.4.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    gen:
      run: melos exec --concurrency=1 -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner for all packages.
      packageFilters:
        dependsOn: build_runner

    test:
      run: melos exec --concurrency=1 -- "flutter test"
      description: Run all tests in the workspace.
      packageFilters:
        dirExists: test

    lint:
      run: melos exec --concurrency=1 -- "flutter analyze"
      description: Run analyzer for all packages.

    fix:
      run: melos exec -- "dart fix --apply"
      description: Apply dart fixes for all packages.

dependency_overrides:
  test_api: 0.7.7
