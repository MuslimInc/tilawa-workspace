name: tilawa_workspace
description: Mono-repo workspace for Tilawa.
repository: https://github.com/MuslimInc/tilawa-workspace.git
publish_to: none
environment:
  sdk: ^3.12.2

workspace:
  - apps/tilawa
  - apps/ui_kit_gallery
  - packages/dartz_plus
  - packages/core
  - packages/qibla
  - packages/ui_kit
  - packages/tilawa_lints
  - packages/quran_qcf
  - packages/quran_image
  - packages/flex_color_scheme
  - packages/compass
  - packages/in_app_update
  - packages/quran_sessions
  - packages/quran_sessions_rtc
  - packages/quran_sessions_rtc_sdk
  - packages/quran_sessions_rtc_stub

dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  melos: ^8.0.0
  bloc_lint: ^0.4.1
  bloc_tools: ^0.1.0-dev.24
  very_good_analysis: 10.3.0

dependency_overrides:
  ffi: ^2.1.4
  device_info_plus: ^13.1.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    # -- Analysis & Formatting -----------------------------------------
    analyze:
      description: Run static analysis across all packages.
      exec:
        command: dart analyze --fatal-infos
        concurrency: 1
      packageFilters:
        ignore:
          - flex_color_scheme

    format:
      description: Check Dart formatting across all packages.
      exec:
        command: sh -c '([ ! -d lib ] || dart format --set-exit-if-changed lib) && ([ ! -d test ] || dart format --set-exit-if-changed test) && ([ ! -d bin ] || dart format --set-exit-if-changed bin) && ([ ! -d tool ] || dart format --set-exit-if-changed tool)'

    format:fix:
      description: Auto-fix Dart formatting across all packages.
      exec:
        command: sh -c '([ ! -d lib ] || dart format lib) && ([ ! -d test ] || dart format test) && ([ ! -d bin ] || dart format bin) && ([ ! -d tool ] || dart format tool)'

    fix:
      description: Apply dart fix suggestions across all packages.
      exec:
        command: dart fix --apply

    fix:format:
      description: Apply dart fix suggestions then auto-format across all packages.
      run: |
        melos run fix
        melos run format:fix

    lint:
      description: Run analyze, UI Kit policy, and format checks (CI gate).
      run: |
        melos run analyze
        melos run format

    bloc:lint:
      description: Run official bloc_lint rules via bloc_tools.
      run: dart run bloc_tools:bloc lint .

    ui:lint:
      description: Enforce Tilawa UI Kit components in product code.
      run: dart analyze --fatal-infos

    # -- Testing -------------------------------------------------------
    test:
      description: Run all tests across all packages.
      exec:
        command: flutter test
      packageFilters:
        dirExists: test

    test:coverage:
      description: Run tests with coverage across all packages.
      exec:
        command: flutter test --coverage
      packageFilters:
        dirExists: test

    # -- Code Generation -----------------------------------------------
    gen:l10n:
      description: Generate Flutter localizations for packages with l10n.yaml.
      run: |
        (cd apps/tilawa && flutter gen-l10n)
        (cd packages/quran_image && flutter gen-l10n)
        (cd packages/quran_sessions && flutter gen-l10n)

    gen:
      description: Run l10n generation then build_runner for the workspace.
      run: |
        melos run gen:l10n
        dart run build_runner build --workspace

    build_runner:
      description: Alias for gen.
      run: melos run gen

    build_runner:watch:
      description: Run build_runner in watch mode across the workspace.
      run: dart run build_runner watch --workspace

    build_runner:stop:
      description: Stop a running build_runner watch/serve across the workspace.
      run: dart run build_runner stop --workspace

    # -- Firebase Hosting (admin panel) --------------------------------
    admin:build:
      description: Build Tilawa admin panel for production.
      run: cd apps/tilawa_admin && npm ci && npm run build

    admin:deploy:
      description: Build and deploy Tilawa admin panel to Firebase Hosting.
      run: |
        cd apps/tilawa_admin && npm ci && npm run build
        firebase deploy --only hosting:admin --project quran-playera-app

    # -- MeMuslim app flavors (apps/tilawa) ---------------------------
    tilawa:run:dev:
      description: Run MeMuslim development flavor on a connected device.
      run: |
        cd apps/tilawa && flutter run --flavor development \
          --dart-define-from-file=env/development.json

    tilawa:run:staging:
      description: Run MeMuslim staging flavor on a connected device.
      run: |
        cd apps/tilawa && flutter run --flavor staging \
          --dart-define-from-file=env/staging.json

    tilawa:run:production:
      description: Run MeMuslim production flavor (release mode).
      run: |
        cd apps/tilawa && flutter run --release --flavor production \
          --dart-define-from-file=env/production.json

    tilawa:build:android:production:
      description: Build signed-ready production App Bundle (arm64).
      run: |
        cd apps/tilawa && flutter build appbundle --release \
          --flavor production \
          --dart-define-from-file=env/production.json \
          --target-platform android-arm64

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: tilawa-2y
