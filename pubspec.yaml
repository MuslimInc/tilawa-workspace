name: tilawa_workspace
description: Mono-repo workspace for Tilawa.
publish_to: none
environment:
  sdk: ^3.12.1

workspace:
  - apps/tilawa
  - apps/ui_kit_gallery
  - packages/core
  - packages/qibla
  - packages/ui_kit
  - packages/quran_qcf
  - packages/quran_image
  - packages/flex_color_scheme
  - packages/compass

dev_dependencies:
  melos: ^7.8.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    # -- Analysis & Formatting -----------------------------------------
    analyze:
      description: Run static analysis across all packages.
      run: dart analyze --fatal-infos
      exec:
        concurrency: 1

    format:
      description: Check Dart formatting across all packages.
      run: dart format --set-exit-if-changed .

    format:fix:
      description: Auto-fix Dart formatting across all packages.
      run: dart format .

    fix:
      description: Apply dart fix suggestions across all packages.
      run: melos exec -- "dart fix --apply"

    lint:
      description: Run analyze + format check (CI gate).
      run: |
        melos run analyze
        melos run format

    # -- Testing -------------------------------------------------------
    test:
      description: Run all tests across all packages.
      run: melos exec -- "flutter test"
      packageFilters:
        dirExists: test

    test:coverage:
      description: Run tests with coverage across all packages.
      run: melos exec -- "flutter test --coverage"
      packageFilters:
        dirExists: test

    # -- Code Generation -----------------------------------------------
    gen:
      description: Run build_runner in packages that depend on it.
      run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
      packageFilters:
        dependsOn: build_runner

    build_runner:
      description: Alias for gen.
      run: melos run gen

    build_runner:watch:
      description: Run build_runner in watch mode.
      run: melos exec -- "dart run build_runner watch --delete-conflicting-outputs"
      packageFilters:
        dependsOn: build_runner
