name: quran_image
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  cupertino_icons: ^1.0.8

  archive: ^4.0.9

  get_it: ^9.2.1

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  fake_async: ^1.3.3
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/databases/
    - assets/data/
    - assets/data/quran_marker_debug_coordinates/

  fonts:
    - family: QuranNumbers
      fonts:
        - asset: assets/fonts/quran_numbers.ttf
