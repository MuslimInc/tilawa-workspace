group 'de.ffuf.in_app_update'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '2.2.10'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven {
            url 'https://storage.googleapis.com/download.flutter.io'
        }
    }
}

def resolveFlutterSdkPath = {
    def localProps = new Properties()
    def candidates = [
        file('local.properties'),
        file('../../../apps/tilawa/android/local.properties'),
    ]
    for (def candidate : candidates) {
        if (candidate.exists()) {
            candidate.withReader('UTF-8') { reader -> localProps.load(reader) }
            def path = localProps.getProperty('flutter.sdk')
            if (path != null) {
                return path
            }
        }
    }
    def envPath = System.getenv('FLUTTER_ROOT')
    if (envPath != null) {
        return envPath
    }
    throw GradleException(
        'Flutter SDK not found. Create android/local.properties or set FLUTTER_ROOT.',
    )
}()

// `+` cannot be resolved against download.flutter.io (no maven-metadata.xml).
// In release builds the Flutter Gradle plugin only injects
// flutter_embedding_release, so the debug embedding below has no concrete
// version in the graph and the build fails. Pin to the SDK's engine stamp.
def flutterEngineVersion = {
    def stampFile = file("${resolveFlutterSdkPath}/bin/cache/engine.stamp")
    if (stampFile.exists()) {
        return "1.0.0-${stampFile.text.trim()}"
    }
    return '+'
}()

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'jacoco'

jacoco {
    toolVersion = '0.8.12'
}

tasks.withType(Test).configureEach {
    jacoco {
        includeNoLocationClasses = true
        excludes = ['jdk.internal.*']
    }
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'de.ffuf.in_app_update'
    }

    compileSdkVersion 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdkVersion 21
    }

    lintOptions {
        disable 'InvalidPackage'
    }

    testOptions {
        unitTests.includeAndroidResources = true
        unitTests.returnDefaultValues = true
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'

    compileOnly "io.flutter:flutter_embedding_debug:${flutterEngineVersion}"
    testImplementation "io.flutter:flutter_embedding_debug:${flutterEngineVersion}"
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:5.4.0'
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation 'androidx.test:core:1.7.0'
}

tasks.register('jacocoTestReport', JacocoReport) {
    dependsOn 'testDebugUnitTest'

    reports {
        xml.required = true
        html.required = true
    }

    def kotlinClasses = fileTree(
            dir: "$buildDir/tmp/kotlin-classes/debug",
            includes: ['de/ffuf/in_app_update/**']
    )

    classDirectories.setFrom(files(kotlinClasses))
    sourceDirectories.setFrom(files('src/main/kotlin'))
    executionData.setFrom(fileTree(dir: buildDir, includes: ['jacoco/testDebugUnitTest.exec']))
}

tasks.register('jacocoTestCoverageVerification', JacocoCoverageVerification) {
    dependsOn 'jacocoTestReport'

    def kotlinClasses = fileTree(
            dir: "$buildDir/tmp/kotlin-classes/debug",
            includes: ['de/ffuf/in_app_update/**']
    )

    classDirectories.setFrom(files(kotlinClasses))
    sourceDirectories.setFrom(files('src/main/kotlin'))
    executionData.setFrom(fileTree(dir: buildDir, includes: ['jacoco/testDebugUnitTest.exec']))

    violationRules {
        rule {
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.90
            }
        }
    }
}
