name: tilawa_ui_kit
resolution: workspace
description: UI library for Tilawa.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.4.0
  flutter_svg: ^2.2.3

  # Utils
  flex_color_scheme:
    path: ../flex_color_scheme
  gap: ^3.0.1
  fluentui_system_icons: ^1.1.273

dev_dependencies:
  alchemist: ^0.14.0
  bloc_lint: ^0.4.1
  checks: ^0.3.1
  flutter_lints: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/athkar_misbaha_icon.svg
    - assets/icons/tasbih_outline_icon.svg
    - assets/icons/google_g_logo.svg
    - assets/icons/quran_icon.svg

  fonts:
    # Bundled IBM Plex Sans Arabic (SIL Open Font License 1.1) so the brand
    # typeface ships with the app instead of being fetched from
    # fonts.gstatic.com at runtime. Referenced as
    # `packages/tilawa_ui_kit/IBMPlexSansArabic`.
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
