name: tilawa_ui_kit
resolution: workspace
description: UI library for Tilawa.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Utils
  google_fonts: ^8.0.0
  flex_color_scheme: ^8.4.0
  skeletonizer:
    path: ../skeletonizer
  gap: ^3.0.1
  fluentui_system_icons: ^1.1.273
  animations: ^2.2.0

dev_dependencies:
  alchemist: ^0.14.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
