name: tilawa_core
resolution: workspace
description: Core shared components for Tilawa app.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  hydrated_bloc: ^11.0.0

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Utils
  dartz_plus:
    path: ../dartz_plus
  equatable: ^2.1.0
  logger: ^2.7.0
  intl: ^0.20.2
  gap: ^3.0.1

  # Data
  shared_preferences: ^2.5.4
  json_annotation: ^4.12.0
  dio: ^5.9.0
  freezed_annotation: ^3.1.0
  connectivity_plus: ^7.0.0
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  firebase_messaging: ^16.4.3
  cloud_firestore: ^6.7.1
  firebase_core: ^4.12.1
  geolocator: ^14.0.2
  flutter_local_notifications: ^22.0.1
  permission_handler: ^12.0.1
  wakelock_plus: ^1.5.1

dev_dependencies:
  bloc_lint: ^0.4.1
  fake_async: ^1.3.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  freezed: ^3.2.4
  json_serializable: ^6.14.0
  injectable_generator: ^3.0.2
  mockito: ^5.6.1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
