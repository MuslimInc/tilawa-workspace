name: tilawa_core
description: Core shared components for Tilawa app.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.7
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  hydrated_bloc: ^10.1.1

  # DI
  get_it: ^9.2.0
  injectable: ^2.7.1

  # Utils
  dartz_plus: ^0.3.0
  equatable: ^2.0.8
  logger: ^2.6.2
  intl: ^0.20.2
  gap: ^3.0.1

  # Data
  shared_preferences: ^2.5.4
  json_annotation: ^4.9.0
  dio: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.10.4
  json_serializable: ^6.11.3
  injectable_generator: ^2.12.0
  mockito: ^5.6.1
