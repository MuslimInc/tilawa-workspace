name: quran
description: "Quran Reader"
version: 0.0.1

environment:
  sdk: ^3.11.3

dependencies:
  archive: ^4.0.9
  dio: ^5.9.1
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  logger: ^2.7.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/
    - assets/quran_fonts/qpc-v4.json
    - assets/quran_fonts/quran_page_index.json

  fonts:
    - family: QCF_BSML
      fonts:
        - asset: assets/quran_fonts/QCF4_QBSML-Regular.ttf
