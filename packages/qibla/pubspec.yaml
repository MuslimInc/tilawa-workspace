name: qibla
resolution: workspace
description: A Qibla direction finder package. that allows you to display Qibla
  direction in you app with support for both Android and iOS
version: 3.1.0+1
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  compass:
    path: ../compass
  geolocator: ^14.0.2
  plugin_platform_interface: ^2.1.8
  stream_transform: ^2.1.1
  vector_math: ^2.1.4

flutter:
  uses-material-design: true
  plugin:
    platforms:
      android:
        package: ml.medyas.qibla
        pluginClass: QiblaPlugin
      ios:
        pluginClass: QiblaPlugin

dev_dependencies:
  bloc_lint: ^0.4.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  meta: ^1.10.0
  mocktail: ^1.0.4
